<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="QuantEdge"/>
<meta name="theme-color" content="#6366f1"/>
<title>QuantEdge AI — Options Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0c0c0f;min-height:100vh;overscroll-behavior:none;font-family:'DM Sans',sans-serif}
#root{min-height:100vh}
#splash{position:fixed;inset:0;background:#0c0c0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .6s cubic-bezier(.4,0,.2,1)}
#splash.hide{opacity:0;pointer-events:none}
.sp-icon{width:56px;height:56px;border-radius:16px;background:#6366f1;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 8px 32px #6366f140}
.sp-q{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:#fff;line-height:1}
.sp-logo{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:700;color:#f0f0f5;letter-spacing:-0.03em;margin-bottom:6px}
.sp-sub{font-family:'DM Mono',monospace;font-size:11px;color:#3a3a55;margin-bottom:28px;letter-spacing:0.1em;text-transform:uppercase}
.sp-bar{width:160px;height:2px;background:#1e1e2e;border-radius:99px;overflow:hidden}
.sp-fill{height:100%;background:#6366f1;border-radius:99px;animation:load .9s cubic-bezier(.4,0,.2,1) forwards}
@keyframes load{from{width:0}to{width:100%}}
.sp-ver{position:absolute;bottom:24px;font-family:'DM Mono',monospace;font-size:10px;color:#3a3a55;letter-spacing:0.05em}
</style>
</head>

</div>
