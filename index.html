<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="QuantEdge AI"/>
<meta name="theme-color" content="#00d4ff"/>
<title>QuantEdge AI — Options Trading Platform</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#04080f;min-height:100vh;overscroll-behavior:none;}
  #root{min-height:100vh;}
  #splash{position:fixed;inset:0;background:#04080f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .4s;}
  #splash.hide{opacity:0;pointer-events:none;}
  .sp-logo{font-family:system-ui,sans-serif;font-size:36px;font-weight:900;color:#00d4ff;letter-spacing:2px;margin-bottom:8px;}
  .sp-sub{font-family:monospace;font-size:12px;color:#2d4a68;margin-bottom:32px;letter-spacing:3px;}
  .sp-bar{width:180px;height:3px;background:#0d1825;border-radius:3px;overflow:hidden;}
  .sp-fill{height:100%;background:linear-gradient(90deg,#00d4ff,#00f5a0);border-radius:3px;animation:load 1.2s ease forwards;}
  @keyframes load{from{width:0}to{width:100%}}
  .sp-ver{position:absolute;bottom:20px;font-family:monospace;font-size:10px;color:#2d4a68;}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-logo">QUANTEDGE AI</div>
  <div class="sp-sub">OPTIONS INTELLIGENCE PLATFORM</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
  <div class="sp-ver">v4.0 · No-Margin · NSE Options</div>
</div>

    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:${u.cardBorder} transparent;}
    html,body,#root{background:${u.bg};min-height:100vh;}
    body{font-family:'JetBrains Mono',monospace;color:${u.text};font-size:12px;}
    .S{font-family:'Syne',sans-serif;}
    .card{background:${u.card};border:1px solid ${u.cardBorder};border-radius:14px;padding:18px;}
    .csm{background:${u.card};border:1px solid ${u.cardBorder};border-radius:10px;padding:13px;}
    .btn{padding:8px 14px;border-radius:9px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .btn:hover{transform:translateY(-1px);filter:brightness(1.12);}
    .btn:active{transform:none;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none;}
    .bp{background:${u.accent};color:${s?"#000":"#fff"};}
    .bs{background:${u.greenBg};color:${u.green};border:1px solid ${u.greenBorder};}
    .bd{background:${u.redBg};color:${u.red};border:1px solid ${u.redBorder};}
    .bo{background:transparent;color:${u.textSub};border:1px solid ${u.cardBorder};}
    .bo:hover{border-color:${u.accent};color:${u.accent};}
    .bghost{background:transparent;color:${u.textMuted};border:none;}
    .inp{background:${u.inputBg};border:1px solid ${u.inputBorder};color:${u.text};padding:9px 12px;border-radius:8px;outline:none;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;transition:border .15s;}
    .inp:focus{border-color:${u.accent};box-shadow:0 0 0 3px ${u.accentDim};}
    .inp::placeholder{color:${u.textMuted};}
    select.inp option{background:${u.card};color:${u.text};}
    .tb{padding:7px 13px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
    .ta{background:${u.accent};color:${s?"#000":"#fff"};}
    .ti{background:transparent;color:${u.textMuted};}
    .ti:hover{color:${u.accent};background:${u.accentDim};}
    .ocard{background:${u.card};border:1px solid ${u.cardBorder};border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
    .ocard:hover,.ocard.sel{border-color:${u.accent};background:${u.cardHover};}
    .pulse{animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .fade{animation:fi .22s ease;}
    @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .metric{background:${u.card};border:1px solid ${u.cardBorder};border-radius:14px;padding:16px;position:relative;overflow:hidden;}
    .metric::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
    .mg::before{background:linear-gradient(90deg,${u.green},${u.green}66);}
    .mr::before{background:linear-gradient(90deg,${u.red},${u.red}66);}
    .mb::before{background:linear-gradient(90deg,${u.accent},${u.accent}66);}
    .my::before{background:linear-gradient(90deg,${u.yellow},${u.yellow}66);}
    .mp::before{background:linear-gradient(90deg,${u.purple},${u.purple}66);}
    table{width:100%;border-collapse:collapse;}
    th{padding:10px 14px;text-align:left;font-size:10px;color:${u.textMuted};letter-spacing:1.2px;font-weight:600;background:${u.card};border-bottom:1px solid ${u.cardBorder};white-space:nowrap;}
    td{padding:9px 14px;border-bottom:1px solid ${u.bg3};font-size:12px;}
    tr:hover td{background:${u.cardHover};}
    .stop-banner{background:#1a0000;border-bottom:2px solid ${u.red};padding:7px 14px;display:flex;align-items:center;gap:10px;font-size:11px;color:${u.red};font-weight:700;}
    .paper-banner{background:${u.paperBanner};border-bottom:2px solid ${u.yellow}55;padding:6px 14px;display:flex;align-items:center;gap:10px;font-size:11px;color:${u.yellow};font-weight:600;}
    .feed-warn{background:#1a0f00;border-bottom:1px solid ${u.yellow}55;padding:5px 14px;font-size:10px;color:${u.yellow};text-align:center;}
    .main-nav{background:${u.navBg};border-bottom:1px solid ${u.navBorder};padding:0 10px;display:flex;align-items:center;gap:6px;height:52px;position:sticky;top:0;z-index:200;box-shadow:${u.shadow};}
    .mobile-nav{position:fixed;bottom:0;left:0;right:0;background:${u.navBg};border-top:1px solid ${u.navBorder};display:flex;z-index:300;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
    .mnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px;border:none;background:transparent;}
    .mnb-icon{font-size:18px;line-height:1;}
    .mnb-label{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:600;color:${u.textMuted};}
    .mnb.active .mnb-label{color:${u.accent};}
    .start-btn{padding:8px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid ${u.green};background:${u.greenBg};color:${u.green};transition:all .2s;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
    .start-btn:hover{background:${u.green};color:#000;transform:translateY(-1px);}
    .stop-btn{padding:8px 18px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid ${u.red};background:${u.redBg};color:${u.red};transition:all .2s;font-family:'JetBrains Mono',monospace;letter-spacing:.5px;}
    .stop-btn:hover{background:${u.red};color:#fff;transform:translateY(-1px);}
    .countdown-bar{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:${u.card};border:1px solid ${u.accent};border-radius:14px;padding:14px 20px;z-index:400;min-width:300px;max-width:90vw;box-shadow:${u.shadowLg};}
