    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;scrollbar-width:thin;scrollbar-color:${u.cardBorder} transparent;}
    html,body,#root{background:${u.bg};min-height:100vh;}
    body{font-family:'JetBrains Mono',monospace;color:${u.text};font-size:12px;}
    .S{font-family:'Syne',sans-serif;}
    .card{background:${u.card};border:1px solid ${u.cardBorder};border-radius:14px;padding:18px;}
    .csm{background:${u.card};border:1px solid ${u.cardBorder};border-radius:10px;padding:12px;}
    .btn{padding:8px 14px;border-radius:9px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
    .btn:hover{filter:brightness(1.12);transform:translateY(-1px);}

    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none;filter:none;}
    .bp{background:${u.accent};color:${s?"#000":"#fff"};}
    .bs{background:${u.greenBg};color:${u.green};border:1px solid ${u.greenBorder};}
    .bd{background:${u.redBg};color:${u.red};border:1px solid ${u.redBorder};}
    .bo{background:transparent;color:${u.textSub};border:1px solid ${u.cardBorder};}
    .bo:hover{border-color:${u.accent};color:${u.accent};}
    .bg{background:transparent;color:${u.textMuted};border:none;}
    .inp{background:${u.inputBg};border:1px solid ${u.inputBorder};color:${u.text};padding:9px 12px;border-radius:8px;outline:none;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%;transition:border .15s;}

    .inp::placeholder{color:${u.textMuted};}
    select.inp option{background:${u.card};color:${u.text};}
    .tb{padding:6px 12px;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;border:none;transition:all .15s;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
    .ta{background:${u.accent};color:${s?"#000":"#fff"};}
    .ti{background:transparent;color:${u.textMuted};}
    .ti:hover{color:${u.accent};background:${u.accentDim};}
    .ocard{background:${u.card};border:1px solid ${u.cardBorder};border-radius:12px;padding:13px;margin-bottom:9px;cursor:pointer;transition:all .15s;}
    .ocard:hover,.ocard.sel{border-color:${u.accent};}
    .pulse{animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

<script>
  // Hide splash only after React has mounted — listen for first paint of #root
  var attempts = 0;
  function tryHide() {
    var root = document.getElementById('root');
    var splash = document.getElementById('splash');
    if (!root || !splash) return;
    if (root.children.length > 0) {
      splash.classList.add('hide');
      setTimeout(function(){ splash.remove(); }, 600);
    } else if (attempts++ < 40) {
      setTimeout(tryHide, 100);
    } else {
      // Fallback after 4s
      splash.classList.add('hide');
      setTimeout(function(){ splash.remove(); }, 600);
    }
  }
